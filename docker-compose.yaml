services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    # Build once, hand the static bundle to the nginx reverse proxy via a shared volume.
    command: ["sh", "-c", "rm -rf /shared/* && cp -r /usr/share/nginx/html/* /shared/ && tail -f /dev/null"]
    volumes:
      - client_build:/shared
    healthcheck:
      # Mark healthy only once the static bundle is in the shared volume, so nginx
      # never serves an empty directory on a cold start.
      test: ["CMD-SHELL", "test -f /shared/index.html"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    depends_on:
      server:
        condition: service_started
      client:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-5677}:80"
    volumes:
      - client_build:/usr/share/nginx/html:ro
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network
    restart: unless-stopped

  # --- MCP feed-source gateways (stdio servers re-exposed as streamable HTTP) ---
  # The agent connects to these at http://<service>:8000/mcp. Internal only.
  mcp-hn:
    build:
      context: ./deploy/mcp
    image: dev-feed-mcp-gateway:latest
    command: ["sh", "-lc", "npx -y supergateway@3.4.3 --stdio \"npx -y hn-mcp\" --outputTransport streamableHttp --port 8000 --streamableHttpPath /mcp"]
    networks:
      - app-network
    restart: unless-stopped

  mcp-arxiv:
    image: dev-feed-mcp-gateway:latest
    build:
      context: ./deploy/mcp
    command: ["sh", "-lc", "npx -y supergateway@3.4.3 --stdio \"arxiv-mcp-server\" --outputTransport streamableHttp --port 8000 --streamableHttpPath /mcp"]
    networks:
      - app-network
    restart: unless-stopped

  mcp-reddit:
    image: dev-feed-mcp-gateway:latest
    build:
      context: ./deploy/mcp
    command: ["sh", "-lc", "npx -y supergateway@3.4.3 --stdio \"npx -y reddit-mcp-server\" --outputTransport streamableHttp --port 8000 --streamableHttpPath /mcp"]
    networks:
      - app-network
    restart: unless-stopped

  # Optional, API-key-gated web-grounded source (the official @perplexity-ai/mcp-server).
  # Behind the `perplexity` compose profile, so a default `make up` does NOT start it.
  # The upstream server calls process.exit(1) when PERPLEXITY_API_KEY is empty, so running
  # it without a key would crash-loop — the profile keeps it off until you opt in with:
  #   docker compose --profile perplexity up -d   (and set PERPLEXITY_API_KEY + MCP_PERPLEXITY_URL)
  # The agent only wires the source when MCP_PERPLEXITY_URL is set, so it stays skipped
  # otherwise. PERPLEXITY_API_KEY is read from .env and handed to the stdio child; nothing
  # else passes a Perplexity credential.
  mcp-perplexity:
    image: dev-feed-mcp-gateway:latest
    profiles: ["perplexity"]
    build:
      context: ./deploy/mcp
    environment:
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
    command: ["sh", "-lc", "npx -y supergateway@3.4.3 --stdio \"npx -y @perplexity-ai/mcp-server\" --outputTransport streamableHttp --port 8000 --streamableHttpPath /mcp"]
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  client_build:
